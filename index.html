<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paw Patrol</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <img class="logo" src=":img/logo.png">
    <h1 class="slots">Slots</h1>
    <div class="container">
        <div><h1 class="slogan">Paw Patrol Is On A Roll!</h1></div>
        <div class="reels">
            <div class="reel1"><img src=":img/chase.jpg"></div>
            <div class="reel2"><img src=":img/Skye.png"></div>
            <div class="reel3"><img src=":img/rocky.jpg"></div>
        </div>
        <div class="buttons">
            <button class="minBtn">Bet 5 coins</button>
            <button class="maxBtn">Bet 50 coins</button>
        </div>
        <h2>Coins Remaining: <span class="coins"></span></h2>
    </div>
    <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
